<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Noticias | COOPSAR</title>
  <link rel="stylesheet" href="/assets/css/styles.css">
</head>
<body>
  <header class="site-header" data-header></header>

  <main>
    <section class="page-hero">
      <div class="container">
        <span class="eyebrow">Noticias</span>
        <h1>Novedades institucionales</h1>
        <p>Comunicados, actividades y noticias publicadas desde Strapi.</p>
      </div>
    </section>

    <section class="page-section">
      <div class="container">
        <div class="toolbar news-toolbar">
          <input type="search" data-news-search placeholder="Buscar noticias" aria-label="Buscar noticias">
          <select data-category-filter aria-label="Filtrar por categoria">
            <option value="">Todas las categorias</option>
          </select>
        </div>
        <div class="news-grid" data-news-grid data-page-size="9"></div>
        <div class="load-more-wrap">
          <button class="button-secondary" type="button" data-load-more>Cargar mas</button>
        </div>
      </div>
    </section>
  </main>

  <footer class="footer" data-footer></footer>
  <script type="module" src="/assets/js/main.js"></script>
</body>
</html>
