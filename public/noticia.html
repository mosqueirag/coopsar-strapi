<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Detalle de noticia | COOPSAR</title>
  <link rel="stylesheet" href="/styles.css">
</head>
<body>

  <header class="site-header">
    <div class="container header-content">
      <div class="brand">
        <span class="brand-icon">C</span>
        <div>
          <strong>COOPSAR</strong>
          <small>Detalle de noticia</small>
        </div>
      </div>

      <nav class="nav">
        <a href="/">Inicio</a>
        <a href="/">Noticias</a>
      </nav>
    </div>
  </header>

  <main class="section">
    <div class="container">
      <article id="detalleNoticia" class="detail-card">
        <p class="loading">Cargando noticia...</p>
      </article>
    </div>
  </main>

  <footer class="footer">
    <div class="container footer-content">
      <p>© COOPSAR - Sarmiento, Chubut</p>
      <p>Strapi CMS</p>
    </div>
  </footer>

  <script>
    async function cargarDetalle() {
      const params = new URLSearchParams(window.location.search);
      const documentId = params.get("id");
      const contenedor = document.getElementById("detalleNoticia");

      if (!documentId) {
        contenedor.innerHTML = "<p>No se encontró la noticia solicitada.</p>";
        return;
      }

      try {
        const respuesta = await fetch(`/api/noticias/${documentId}`);
        const resultado = await respuesta.json();
        const noticia = resultado.data;

        contenedor.innerHTML = `
          <a href="/" class="back-link">← Volver a noticias</a>
          <span class="detail-label">Noticia institucional</span>
          <h1>${noticia.titulo}</h1>
          <p class="detail-summary">${noticia.resumen || ""}</p>
          <div class="detail-content">
            ${noticia.contenido || ""}
          </div>
        `;
      } catch (error) {
        contenedor.innerHTML = "<p>No se pudo cargar la noticia.</p>";
        console.error(error);
      }
    }

    cargarDetalle();
  </script>

</body>
</html>
